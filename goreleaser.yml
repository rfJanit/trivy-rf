version: 2

project_name: trivy
builds:
  - id: build-linux
    main: ./cmd/trivy/
    binary: trivy
    ldflags:
      - -s -w
      - "-extldflags '-static'"
      - -X github.com/aquasecurity/trivy/pkg/version/app.ver={{.Version}}
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=jsonv2
    goos:
      - linux
    goarch:
      - 386
      - arm
      - amd64
      - arm64
      - s390x
      - ppc64le
    goarm:
      - 7
  - id: build-bsd
    main: ./cmd/trivy/
    binary: trivy
    ldflags:
      - -s -w
      - "-extldflags '-static'"
      - -X github.com/aquasecurity/trivy/pkg/version/app.ver={{.Version}}
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=jsonv2
    goos:
      - freebsd
    goarch:
      # modernc.org/sqlite doesn't support freebsd/arm64, etc.
      # Also, freebsd/386 is no longer supported in modernc.org/libc
      # See: https://gitlab.com/cznic/libc/-/issues/45
      - amd64
  - id: build-macos
    main: ./cmd/trivy/
    binary: trivy
    ldflags:
      - -s -w
      - "-extldflags '-static'"
      - -X github.com/aquasecurity/trivy/pkg/version/app.ver={{.Version}}
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=jsonv2
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    goarm:
      - 7
  - id: build-windows
    main: ./cmd/trivy/
    binary: trivy
    ldflags:
      - -s -w
      - "-extldflags '-static'"
      - -X github.com/aquasecurity/trivy/pkg/version/app.ver={{.Version}}
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=jsonv2
    goos:
      - windows
    goarch:
      # modernc.org/sqlite doesn't support windows/386 and windows/arm, etc.
      - amd64
    goarm:
      - 7

release:
    extra_files:
      - glob: ./bom.json
    # discussion_category_name intentionally omitted — enable GitHub Discussions
    # on the fork and set this to a category name (e.g. "Announcements") if you
    # want each release to auto-post there.

nfpms:
  -
    formats:
      - deb
      - rpm
    vendor: "RapidFort"
    homepage: "https://github.com/rfJanit/trivy-rf"
    maintainer: "RapidFort"
    description: "RapidFort's Trivy fork — A Fast Vulnerability Scanner for Containers, extended with RapidFort curated advisories."
    license: "Apache-2.0"
    file_name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else if eq .Os "openbsd" }}OpenBSD
      {{- else if eq .Os "netbsd" }}NetBSD
      {{- else if eq .Os "freebsd" }}FreeBSD
      {{- else if eq .Os "dragonfly" }}DragonFlyBSD
      {{- else}}{{- title .Os }}{{ end }}-
      {{- if eq .Arch "amd64" }}64bit
      {{- else if eq .Arch "386" }}32bit
      {{- else if eq .Arch "arm" }}ARM
      {{- else if eq .Arch "arm64" }}ARM64
      {{- else if eq .Arch "ppc64le" }}PPC64LE
      {{- else }}{{ .Arch }}{{ end }}
    contents:
     - src: contrib/*.tpl
       dst: /usr/local/share/trivy/templates
    # RPM signing intentionally omitted for the first release.
    # Add a `rpm.signature.key_file: '{{ .Env.GPG_FILE }}'` block once you have a signing key.

archives:
  - id: archive
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else if eq .Os "linux" }}Linux
      {{- else if eq .Os "openbsd" }}OpenBSD
      {{- else if eq .Os "netbsd" }}NetBSD
      {{- else if eq .Os "freebsd" }}FreeBSD
      {{- else if eq .Os "dragonfly" }}DragonFlyBSD
      {{- else}}{{- .Os }}{{ end }}-
      {{- if eq .Arch "amd64" }}64bit
      {{- else if eq .Arch "386" }}32bit
      {{- else if eq .Arch "arm" }}ARM
      {{- else if eq .Arch "arm64" }}ARM64
      {{- else if eq .Arch "ppc64le" }}PPC64LE
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE
      - contrib/*.tpl
    format_overrides:
      - goos: windows
        formats: [zip]


# Per-arch container images pushed only to GHCR under the fork's owner.
# Docker Hub and public.ecr.aws removed for the first release — reintroduce them
# with the aquasec image_template pattern once you have DOCKERHUB_* / ECR_* secrets.
# s390x and ppc64le kept from upstream; drop them if you want faster releases and
# don't care about IBM Z / Power targets.
dockers:
  - image_templates:
      - "ghcr.io/rfjanit/trivy:{{ .Version }}-amd64"
      - "ghcr.io/rfjanit/trivy:latest-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    ids:
      - build-linux
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=RapidFort's Trivy fork with curated advisories"
      - "--label=org.opencontainers.image.vendor=RapidFort"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/rfJanit/trivy-rf"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.url=https://github.com/rfJanit/trivy-rf"
      - "--platform=linux/amd64"
    extra_files:
    - contrib/
  - image_templates:
      - "ghcr.io/rfjanit/trivy:{{ .Version }}-arm64"
      - "ghcr.io/rfjanit/trivy:latest-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    ids:
      - build-linux
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=RapidFort's Trivy fork with curated advisories"
      - "--label=org.opencontainers.image.vendor=RapidFort"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/rfJanit/trivy-rf"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.url=https://github.com/rfJanit/trivy-rf"
      - "--platform=linux/arm64"
    extra_files:
    - contrib/
  - image_templates:
      - "ghcr.io/rfjanit/trivy:{{ .Version }}-s390x"
      - "ghcr.io/rfjanit/trivy:latest-s390x"
    use: buildx
    goos: linux
    goarch: s390x
    ids:
      - build-linux
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=RapidFort's Trivy fork with curated advisories"
      - "--label=org.opencontainers.image.vendor=RapidFort"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/rfJanit/trivy-rf"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.url=https://github.com/rfJanit/trivy-rf"
      - "--platform=linux/s390x"
    extra_files:
    - contrib/
  - image_templates:
      - "ghcr.io/rfjanit/trivy:{{ .Version }}-ppc64le"
      - "ghcr.io/rfjanit/trivy:latest-ppc64le"
    use: buildx
    goos: linux
    goarch: ppc64le
    ids:
      - build-linux
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=RapidFort's Trivy fork with curated advisories"
      - "--label=org.opencontainers.image.vendor=RapidFort"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/rfJanit/trivy-rf"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.url=https://github.com/rfJanit/trivy-rf"
      - "--platform=linux/ppc64le"
    extra_files:
    - contrib/

# Multi-arch manifests that let `docker pull ghcr.io/rfjanit/trivy:<tag>` resolve to
# the right per-arch image automatically. GHCR-only for the first release.
docker_manifests:
  - name_template: 'ghcr.io/rfjanit/trivy:{{ .Version }}'
    image_templates:
    - 'ghcr.io/rfjanit/trivy:{{ .Version }}-amd64'
    - 'ghcr.io/rfjanit/trivy:{{ .Version }}-arm64'
    - 'ghcr.io/rfjanit/trivy:{{ .Version }}-s390x'
    - 'ghcr.io/rfjanit/trivy:{{ .Version }}-ppc64le'
  - name_template: 'ghcr.io/rfjanit/trivy:latest'
    image_templates:
    - 'ghcr.io/rfjanit/trivy:{{ .Version }}-amd64'
    - 'ghcr.io/rfjanit/trivy:{{ .Version }}-arm64'
    - 'ghcr.io/rfjanit/trivy:{{ .Version }}-s390x'
    - 'ghcr.io/rfjanit/trivy:{{ .Version }}-ppc64le'

# Cosign signing (blob + container) intentionally omitted for the first release.
# When you're ready to sign, uncomment and re-add:
#
# signs:
#   - cmd: cosign
#     env: [COSIGN_EXPERIMENTAL=1]
#     signature: "${artifact}.sigstore.json"
#     args: ["sign-blob", "--bundle=${signature}", "${artifact}", "--yes"]
#     artifacts: all
#     output: true
# docker_signs:
#   - cmd: cosign
#     env: [COSIGN_EXPERIMENTAL=1]
#     artifacts: manifests
#     args: ["sign", "${artifact}", "--yes"]
#     output: true
#
# Signing from GitHub Actions requires `id-token: write` permission on the workflow
# so cosign can obtain an OIDC token — otherwise `sign-blob` fails with a Sigstore error.
