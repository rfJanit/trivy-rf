name: Reusable release
on:
  workflow_call:
    inputs:
      goreleaser_config:
        description: 'file path to GoReleaser config'
        required: true
        type: string
      goreleaser_options:
        description: 'GoReleaser options separated by spaces'
        default: ''
        required: false
        type: string
    # No external secrets required for the first release.
    # If/when you add Docker Hub, ECR, or GPG signing, re-add matching
    # `secrets:` entries here and pass them from release.yaml.

jobs:
  release:
    name: Release
    # ubuntu-2404-4core was upstream aquasec's custom self-hosted runner label.
    # Your fork has no runner registered under that label, so the job would queue
    # forever. Use a GitHub-hosted runner instead.
    runs-on: ubuntu-latest
    env:
      DOCKER_CLI_EXPERIMENTAL: "enabled"
    permissions:
      id-token: write     # cosign (via actions/attest OIDC); harmless if unused
      packages: write     # publish container images to ghcr.io/<owner>/*
      contents: write     # create the GitHub Release + upload assets
      attestations: write # actions/attest — attach build provenance to the Release
    steps:
      - name: Cosign install
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Show available Docker Buildx platforms
        env:
          PLATFORMS: ${{ steps.buildx.outputs.platforms }}
        run: echo "${PLATFORMS}"

      - name: Login to ghcr.io registry
        # `github.actor` is the user/bot that pushed the tag; combined with
        # secrets.GITHUB_TOKEN this is enough to push to ghcr.io/<owner>/*
        # as long as the workflow declares `permissions: packages: write`.
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Generate SBOM
        uses: CycloneDX/gh-gomod-generate-sbom@efc74245d6802c8cefd925620515442756c70d8f # v2.0.0
        with:
          args: mod -licenses -json -output bom.json
          version: ^v1

      # Create tmp dir for GoReleaser
      - name: "create tmp dir"
        run: |
          mkdir tmp

      - name: GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          # Bumped from v2.1.0 (inherited from upstream) to match the version
          # this fork's goreleaser.yml is validated against. v2.1.0 predates the
          # `archives.formats:` plural field, so it can't parse this config.
          version: v2.16.0
          args: release -f=${{ inputs.goreleaser_config}} ${{ inputs.goreleaser_options}}
        env:
          # GITHUB_TOKEN gives GoReleaser permission to create the GitHub Release
          # and upload assets. `permissions: contents: write` on the job scopes it.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TMPDIR: "tmp"
        # NFPM_DEFAULT_RPM_PASSPHRASE / GPG_FILE removed — RPM signing is off in
        # goreleaser.yml for the first release. Re-add them alongside the
        # `rpm.signature.key_file` block when a signing key becomes available.

      # Canary "Build and push" step retargeted at your fork's GHCR only.
      # Only fires when release.yaml (or canary.yaml) calls this reusable workflow
      # with goreleaser_config: goreleaser-canary.yml — dormant for normal releases.
      # Update or remove goreleaser-canary.yml itself if you don't ship canary builds.
      - name: Build and push
        if: ${{ inputs.goreleaser_config == 'goreleaser-canary.yml' }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          platforms: linux/amd64, linux/arm64
          file: ./Dockerfile.canary
          context: .
          push: true
          tags: |
            ghcr.io/rfjanit/trivy:canary

      - name: Generate build provenance attestations
        if: ${{ inputs.goreleaser_config != 'goreleaser-canary.yml' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: dist/trivy_${{ fromJSON(steps.goreleaser.outputs.metadata).version }}_checksums.txt

      # This workflow is only triggered by tag pushes (release.yaml: on.push.tags), which require
      # maintainer access. Fork PRs cannot reach this code path, so the cache cannot be poisoned
      # by external contributors. The key is scoped to github.sha, making cross-run collisions
      # impossible. Cache is written here and read only by the deploy-packages job in release.yaml.
      - name: Cache Trivy binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # zizmor: ignore[cache-poisoning] # v5.0.5
        with:
          path: dist/
          # use 'github.sha' to create a unique cache folder for each run.
          # use 'github.workflow' to create a unique cache folder if some runs have same commit sha.
          # e.g. build and release runs
          key: ${{ runner.os }}-bins-${{github.workflow}}-${{github.sha}}
