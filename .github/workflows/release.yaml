name: Release
on:
  push:
    tags:
      - "v*"

# Publishing to ghcr.io/<owner>/trivy and creating a GitHub Release both need
# repo-scoped write access. Declaring these here is redundant with the reusable
# workflow (which also declares them at the job level), but making it explicit
# at the top level documents intent and future-proofs against accidental drops.
permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    uses: ./.github/workflows/reusable-release.yaml
    with:
      goreleaser_config: goreleaser.yml
      goreleaser_options: '--clean --timeout 90m'
