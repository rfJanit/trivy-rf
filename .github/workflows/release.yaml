name: Release
on:
  push:
    tags:
      - "v*"

# A calling workflow can only forward scopes it has itself — any permission not
# listed here is implicitly `none`, and the reusable workflow will be blocked
# from requesting more than that. These four must match reusable-release.yaml's
# job-level permissions block.
permissions:
  contents: write     # GitHub Release + asset upload
  packages: write     # GHCR push
  id-token: write     # OIDC token for build-provenance attestations
  attestations: write # actions/attest — write attestations to the release

jobs:
  release:
    name: Release
    uses: ./.github/workflows/reusable-release.yaml
    with:
      goreleaser_config: goreleaser.yml
      goreleaser_options: '--clean --timeout 90m'
